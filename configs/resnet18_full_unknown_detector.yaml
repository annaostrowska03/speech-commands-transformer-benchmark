experiment_name: resnet18_full_unknown_detector
model: resnet18
data_path: ./data/train

seeds: [42, 123, 2026, 2137]
epochs: 40
patience: 8
batch_size: 64
num_workers: 4

lr: 0.001
optimizer: adam
momentum: 0.9
weight_decay: 0.0001
dropout: 0.1

n_mels: 64
use_pretrained: true
freeze_backbone: false
use_augment: false
time_mask: 30
freq_mask: 12

use_separate_unknown_detector: true
unknown_detector_model: mobilenetv2
unknown_detector_epochs: 8
unknown_detector_threshold: 0.5

balancing: none
unknown_keep_prob: 1.0
silence_train_samples: 2300
silence_eval_samples: 250

run_test: true
checkpoint_path: best_model.pt
